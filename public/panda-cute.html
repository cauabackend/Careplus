<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CarePlus+ — Panda</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#37C3FF;--bg-a:#091540;--bg-b:#040b1e}
.s-excellent{--accent:#37C3FF;--bg-a:#091540;--bg-b:#040b1e}
.s-good     {--accent:#2DD75F;--bg-a:#062812;--bg-b:#031408}
.s-warning  {--accent:#FFA023;--bg-a:#2a1604;--bg-b:#160a02}
.s-critical {--accent:#FF3A3A;--bg-a:#2a0808;--bg-b:#160404}
body{
  min-height:100vh;
  background:radial-gradient(ellipse 140% 120% at 22% 58%,var(--bg-a),var(--bg-b) 72%);
  font-family:'Plus Jakarta Sans',sans-serif;color:#fff;
  transition:background 1.1s ease;padding:44px 20px 52px;
}
.center{display:flex;justify-content:center}
h1{text-align:center;font-size:.68rem;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:8px}
h2{text-align:center;font-size:2rem;font-weight:800;letter-spacing:-.025em;margin-bottom:5px}
.sub{text-align:center;font-size:.8rem;color:rgba(255,255,255,.3);margin-bottom:28px}
.btns{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:32px}
.btn{padding:8px 18px;border:1px solid rgba(255,255,255,.1);border-radius:999px;font:600 .7rem 'Plus Jakarta Sans',sans-serif;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;background:rgba(255,255,255,.06);color:rgba(255,255,255,.48);transition:all .22s ease}
.btn:hover{background:rgba(255,255,255,.14);color:#fff}
.btn.on{background:var(--accent);border-color:transparent;color:#fff}
.panda-wrap{filter:drop-shadow(0 28px 52px rgba(0,0,20,.92))}
.rl{fill:var(--accent);opacity:.18}
.state-note{text-align:center;font-size:.76rem;color:rgba(255,255,255,.28);margin-top:20px}
@keyframes float  {0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
@keyframes zzz    {0%{opacity:0;transform:translate(0,0)scale(.5)}40%{opacity:1}100%{opacity:0;transform:translate(-12px,-56px)scale(1.3)}}
@keyframes zzz2   {0%{opacity:0;transform:translate(0,0)scale(.4)}40%{opacity:.6}100%{opacity:0;transform:translate(-7px,-40px)scale(.9)}}
</style>
</head>
<body class="s-excellent" id="app">
<h1>CarePlus+</h1>
<h2>Panda Mascote</h2>
<p class="sub">Rim light dinâmica baseada no estado de saúde</p>
<div class="btns">
  <button class="btn on" onclick="set('excellent',this)">Excelente</button>
  <button class="btn"    onclick="set('good',this)">Bom</button>
  <button class="btn"    onclick="set('warning',this)">Regular</button>
  <button class="btn"    onclick="set('critical',this)">Crítico</button>
</div>
<div class="center">
<div class="panda-wrap" id="panda-wrap">

<svg viewBox="0 0 300 448" width="270"
     xmlns="http://www.w3.org/2000/svg"
     fill="none" stroke-linejoin="round" stroke-linecap="round">
<defs>
  <radialGradient id="gs" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="rgba(0,0,0,.55)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
  </radialGradient>

  <!--
    CORPO: rect com rx/ry grandes = barrel shape
    x=50, w=200 → 200px de largura
    y=205, h=185 → 185px de altura
    rx=62 ry=56  → cantos bem arredondados, mas CLARAMENTE retangular/barril
  -->
  <clipPath id="c-bd">
    <rect x="54" y="212" width="192" height="182" rx="58" ry="54"/>
  </clipPath>

  <!-- Cabeça -->
  <clipPath id="c-hd"><circle cx="150" cy="112" r="94"/></clipPath>

  <!-- Braços (clip para rim light) -->
  <clipPath id="c-la">
    <rect x="10" y="228" width="58" height="90" rx="28" transform="rotate(-12,39,273)"/>
  </clipPath>
  <clipPath id="c-ra">
    <rect x="232" y="228" width="58" height="90" rx="28" transform="rotate(12,261,273)"/>
  </clipPath>

  <!-- Orelhas -->
  <clipPath id="c-le"><circle cx="68" cy="40" r="26"/></clipPath>
  <clipPath id="c-re"><circle cx="232" cy="40" r="26"/></clipPath>

  <!-- Pernas -->
  <clipPath id="c-ll"><rect x="84" y="368" width="60" height="52" rx="26"/></clipPath>
  <clipPath id="c-rl"><rect x="156" y="368" width="60" height="52" rx="26"/></clipPath>

  <!-- Manchas dos olhos — mais afastadas entre si -->
  <clipPath id="c-ep-l">
    <ellipse cx="107" cy="118" rx="37" ry="31" transform="rotate(-8,107,118)"/>
  </clipPath>
  <clipPath id="c-ep-r">
    <ellipse cx="193" cy="118" rx="37" ry="31" transform="rotate(8,193,118)"/>
  </clipPath>

  <!-- Focinho -->
  <clipPath id="c-mz">
    <ellipse cx="150" cy="162" rx="34" ry="23"/>
  </clipPath>
</defs>

<!-- Sombra chão -->
<ellipse cx="150" cy="440" rx="88" ry="10" fill="url(#gs)"/>


<!-- ══════════════  ORELHAS  ══════════════ -->
<circle cx="68"  cy="40" r="26" fill="#1A1828" stroke="#0D0C1A" stroke-width="4"/>
<circle cx="68"  cy="46" r="14" fill="#12101E"/>
<ellipse cx="63" cy="33" rx="9" ry="5" fill="rgba(255,255,255,.09)" clip-path="url(#c-le)"/>
<circle cx="46"  cy="40" r="23" class="rl" clip-path="url(#c-le)"/>

<circle cx="232" cy="40" r="26" fill="#1A1828" stroke="#0D0C1A" stroke-width="4"/>
<circle cx="232" cy="46" r="14" fill="#12101E"/>
<ellipse cx="237" cy="33" rx="9" ry="5" fill="rgba(255,255,255,.09)" clip-path="url(#c-re)"/>


<!-- ══════════════  PERNAS — curtas e gordas  ══════════════ -->
<rect x="84"  y="368" width="60" height="52" rx="26"
      fill="#1A1828" stroke="#0D0C1A" stroke-width="4"/>
<ellipse cx="114" cy="377" rx="18" ry="6" fill="rgba(255,255,255,.10)" clip-path="url(#c-ll)"/>
<rect x="84" y="368" width="26" height="52" rx="22" class="rl" clip-path="url(#c-ll)"/>

<rect x="156" y="368" width="60" height="52" rx="26"
      fill="#1A1828" stroke="#0D0C1A" stroke-width="4"/>
<ellipse cx="186" cy="377" rx="18" ry="6" fill="rgba(255,255,255,.10)" clip-path="url(#c-rl)"/>


<!-- ══════════════
     CORPO BARRIL
     rect 200×185 com rx=62 ry=56
     Parece um "rounded square", NÃO uma elipse pura
══════════════ -->
<rect x="54" y="212" width="192" height="182" rx="58" ry="54"
      fill="#1A1828" stroke="#0D0C1A" stroke-width="4"/>
<!-- Rim light lateral esq -->
<rect x="54" y="212" width="88" height="182" rx="56" ry="54"
      class="rl" clip-path="url(#c-bd)"/>
<!-- Highlight ombro -->
<ellipse cx="150" cy="220" rx="56" ry="11" fill="rgba(255,255,255,.06)" clip-path="url(#c-bd)"/>
<!-- Barriga branca — proeminente -->
<ellipse cx="152" cy="294" rx="70" ry="80"
         fill="#FFFFFF" stroke="#0D0C1A" stroke-width="3"/>
<!-- Sombra base barriga -->
<ellipse cx="152" cy="362" rx="46" ry="16" fill="rgba(0,0,0,.07)" clip-path="url(#c-bd)"/>


<!-- ══════════════
     BRAÇOS — desenhados DEPOIS do corpo, visíveis na frente
     Posicionados nas laterais, rotação apontando para fora
══════════════ -->
<!-- Braço esq: x=10 → extends left of body edge (body left at ~x=50) -->
<rect x="10" y="228" width="58" height="90" rx="28"
      transform="rotate(-12,39,273)"
      fill="#1A1828" stroke="#0D0C1A" stroke-width="4"/>
<rect x="10" y="228" width="28" height="90" rx="22"
      transform="rotate(-12,39,273)"
      class="rl" clip-path="url(#c-la)"/>
<rect x="56" y="233" width="8" height="80" rx="4"
      transform="rotate(-12,60,273)"
      fill="rgba(255,255,255,.10)" clip-path="url(#c-la)"/>

<!-- Braço dir: x=232 → extends right of body edge (body right at ~x=250) -->
<rect x="232" y="228" width="58" height="90" rx="28"
      transform="rotate(12,261,273)"
      fill="#1A1828" stroke="#0D0C1A" stroke-width="4"/>
<rect x="262" y="228" width="28" height="90" rx="22"
      transform="rotate(12,261,273)"
      class="rl" clip-path="url(#c-ra)"/>
<rect x="236" y="233" width="8" height="80" rx="4"
      transform="rotate(12,240,273)"
      fill="rgba(255,255,255,.10)" clip-path="url(#c-ra)"/>


<!-- ══════════════  CABEÇA  ══════════════ -->
<circle cx="150" cy="112" r="94"
        fill="#F8F6F2" stroke="#0D0C1A" stroke-width="4"/>
<ellipse cx="184" cy="66" rx="24" ry="15"
         fill="rgba(255,255,255,.60)" clip-path="url(#c-hd)"/>
<ellipse cx="188" cy="62" rx="10" ry="6"
         fill="rgba(255,255,255,.90)" clip-path="url(#c-hd)"/>
<ellipse cx="150" cy="200" rx="38" ry="8" fill="rgba(0,0,0,.17)"/>


<!-- ══════════════
     MANCHAS DOS OLHOS
     Separadas — cx=107 e cx=193 (gap de 14px entre elas)
     rx=37 ry=31
══════════════ -->
<ellipse cx="107" cy="118" rx="37" ry="31"
         transform="rotate(-8,107,118)"
         fill="#1A1828" stroke="#0D0C1A" stroke-width="3"/>
<ellipse cx="100" cy="103" rx="15" ry="7"
         transform="rotate(-8,100,103)"
         fill="rgba(255,255,255,.12)" clip-path="url(#c-ep-l)"/>

<ellipse cx="193" cy="118" rx="37" ry="31"
         transform="rotate(8,193,118)"
         fill="#1A1828" stroke="#0D0C1A" stroke-width="3"/>
<ellipse cx="200" cy="103" rx="15" ry="7"
         transform="rotate(8,200,103)"
         fill="rgba(255,255,255,.12)" clip-path="url(#c-ep-r)"/>


<!-- ══════════════
     OLHOS — centralizados dentro das manchas
══════════════ -->
<!-- Esq -->
<circle cx="107" cy="119" r="19" fill="#FFFFFF"/>
<circle cx="110" cy="121" r="13" fill="#2C1F10"/>
<circle cx="110" cy="121" r="8"  fill="#08071A"/>
<circle cx="117" cy="112" r="6"  fill="#FFFFFF"/>
<circle cx="104" cy="128" r="2.5" fill="rgba(255,255,255,.6)"/>

<!-- Dir -->
<circle cx="193" cy="119" r="19" fill="#FFFFFF"/>
<circle cx="190" cy="121" r="13" fill="#2C1F10"/>
<circle cx="190" cy="121" r="8"  fill="#08071A"/>
<circle cx="183" cy="112" r="6"  fill="#FFFFFF"/>
<circle cx="196" cy="128" r="2.5" fill="rgba(255,255,255,.6)"/>

<!-- Pálpebras (warning/critical) -->
<g id="eyelids" style="display:none">
  <ellipse cx="107" cy="112" rx="20" ry="14" fill="#1A1828"/>
  <ellipse cx="193" cy="112" rx="20" ry="14" fill="#1A1828"/>
</g>


<!-- ══════════════
     BOCHECHAS — movidas para dentro da face
     Head: cx=150, cy=112, r=94
     A y=148, a borda da face fica em x≈ 150±87 → x=63 e x=237
     cx=88 e cx=212 ficam bem dentro com margem segura
══════════════ -->
<ellipse cx="88"  cy="160" rx="13" ry="8" fill="rgba(255,110,135,.40)"/>
<ellipse cx="212" cy="160" rx="13" ry="8" fill="rgba(255,110,135,.40)"/>


<!-- ══════════════  FOCINHO  ══════════════ -->
<ellipse cx="150" cy="162" rx="34" ry="23"
         fill="#EDECEA" stroke="#B8B5B0" stroke-width="1.5"/>
<ellipse cx="150" cy="150" rx="28" ry="8"
         fill="rgba(0,0,0,.07)" clip-path="url(#c-mz)"/>
<line x1="150" y1="162" x2="150" y2="172"
      stroke="#C0BCBA" stroke-width="1.2"/>

<!-- Nariz -->
<ellipse cx="150" cy="154" rx="12" ry="8" fill="#1A1828"/>
<ellipse cx="146" cy="151" rx="4" ry="2.5" fill="rgba(255,255,255,.42)"/>
<circle cx="145" cy="158" r="1.8" fill="#0D0C18"/>
<circle cx="155" cy="158" r="1.8" fill="#0D0C18"/>

<!-- Boca -->
<path d="M 141 167 Q 150 177 159 167 Q 153 175 147 175 Z"
      fill="rgba(40,20,20,.22)"/>
<path d="M 141 167 Q 150 177 159 167"
      stroke="#1A1828" stroke-width="2.8"/>


</svg>
</div>
</div>
<p class="state-note" id="note">Excelente — rim light ciano</p>
<script>
const cfg={
  excellent:{note:'Excelente — rim light ciano', anim:'float 4s ease-in-out infinite',  lids:false,zzz:false},
  good:     {note:'Bom — rim light verde',        anim:'float 4s ease-in-out infinite',  lids:false,zzz:false},
  warning:  {note:'Regular — rim light âmbar',    anim:'breathe 3s ease-in-out infinite',lids:true, zzz:false},
  critical: {note:'Crítico — rim light vermelho', anim:'none',                            lids:true, zzz:true},
};
function set(s,btn){
  document.getElementById('app').className='s-'+s;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  document.getElementById('note').textContent=cfg[s].note;
  document.getElementById('eyelids').style.display=cfg[s].lids?'':'none';
  const zg=document.getElementById('zzz-g');
  if(zg)zg.style.display=cfg[s].zzz?'':'none';
  const w=document.getElementById('panda-wrap');
  w.style.animation='none';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{w.style.animation=cfg[s].anim;}));
}
document.getElementById('panda-wrap').style.animation=cfg.excellent.anim;
</script>
<script>
(function(){
  const svg=document.querySelector('svg');
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.id='zzz-g';g.style.display='none';
  g.innerHTML=`
    <text x="176" y="84" font-family="Plus Jakarta Sans,sans-serif" font-size="21" font-weight="800" fill="rgba(255,255,255,.85)" style="animation:zzz 2.5s ease-in-out infinite">z</text>
    <text x="194" y="66" font-family="Plus Jakarta Sans,sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,.5)" style="animation:zzz2 2.5s ease-in-out infinite .6s">z</text>
  `;
  svg.appendChild(g);
})();
</script>
</body>
</html>
