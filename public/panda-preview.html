<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarePlus+ — Mascote Panda</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sora', sans-serif;
      background: #060E2B;
      color: #fff;
      min-height: 100vh;
      padding: 48px 32px;
    }

    h1 {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    h2 {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 56px;
      color: #fff;
    }

    .states-grid {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin-bottom: 80px;
    }

    .state-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .panda-wrapper {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glow-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      filter: blur(24px);
      opacity: 0.35;
    }

    .state-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .state-name {
      font-size: 1rem;
      font-weight: 600;
      margin-top: -12px;
    }

    /* Divider */
    .section-divider {
      width: 60px;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 0 auto 56px;
    }

    .section-title {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 40px;
    }

    /* Expressions */
    .expressions-grid {
      display: flex;
      justify-content: center;
      gap: 56px;
      flex-wrap: wrap;
      margin-bottom: 80px;
    }

    .expression-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .expression-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      font-weight: 400;
    }

    /* Sizes */
    .sizes-grid {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 48px;
      flex-wrap: wrap;
    }

    .size-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .size-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
    }

    /* Animation */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.6; }
    }
    .floating { animation: float 3s ease-in-out infinite; }
    .pulsing { animation: pulse-glow 3s ease-in-out infinite; }
  </style>
</head>
<body>

  <h1>CarePlus+</h1>
  <h2>Mascote — Panda Minimalista</h2>

  <!-- ESTADOS VITALS WEATHER -->
  <p class="section-title">Estados Vitals Weather</p>
  <div class="states-grid">

    <!-- EXCELENTE -->
    <div class="state-card">
      <div class="panda-wrapper">
        <div class="glow-ring pulsing" style="background: radial-gradient(circle, #7DD9FF, #00B4D8);"></div>
        <svg class="floating" width="110" height="110" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Ears -->
          <ellipse cx="24" cy="26" rx="14" ry="14" fill="#e8f7ff"/>
          <ellipse cx="86" cy="26" rx="14" ry="14" fill="#e8f7ff"/>
          <ellipse cx="24" cy="26" rx="8" ry="8" fill="#b3e9ff"/>
          <ellipse cx="86" cy="26" rx="8" ry="8" fill="#b3e9ff"/>
          <!-- Head -->
          <circle cx="55" cy="58" r="42" fill="#f0faff"/>
          <!-- Eye patches -->
          <ellipse cx="38" cy="52" rx="13" ry="11" fill="#c8eeff" opacity="0.9"/>
          <ellipse cx="72" cy="52" rx="13" ry="11" fill="#c8eeff" opacity="0.9"/>
          <!-- Eyes -->
          <circle cx="38" cy="52" r="5.5" fill="#0a1f3d"/>
          <circle cx="72" cy="52" r="5.5" fill="#0a1f3d"/>
          <!-- Eye shine -->
          <circle cx="40" cy="50" r="1.8" fill="white"/>
          <circle cx="74" cy="50" r="1.8" fill="white"/>
          <!-- Nose -->
          <ellipse cx="55" cy="64" rx="5" ry="3.5" fill="#0a1f3d"/>
          <!-- Smile -->
          <path d="M46 72 Q55 80 64 72" stroke="#0a1f3d" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <!-- Cheek blush -->
          <ellipse cx="28" cy="66" rx="7" ry="4" fill="#7DD9FF" opacity="0.4"/>
          <ellipse cx="82" cy="66" rx="7" ry="4" fill="#7DD9FF" opacity="0.4"/>
        </svg>
      </div>
      <span class="state-label" style="color: #7DD9FF;">Excelente</span>
      <span class="state-name" style="color: #7DD9FF;">Cristalino</span>
    </div>

    <!-- BOM -->
    <div class="state-card">
      <div class="panda-wrapper">
        <div class="glow-ring" style="background: radial-gradient(circle, #00B4D8, #008FA8);"></div>
        <svg width="110" height="110" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="24" cy="26" rx="14" ry="14" fill="#e0f5f8"/>
          <ellipse cx="86" cy="26" rx="14" ry="14" fill="#e0f5f8"/>
          <ellipse cx="24" cy="26" rx="8" ry="8" fill="#a0dde8"/>
          <ellipse cx="86" cy="26" rx="8" ry="8" fill="#a0dde8"/>
          <circle cx="55" cy="58" r="42" fill="#edf8fa"/>
          <ellipse cx="38" cy="52" rx="13" ry="11" fill="#9dd8e4" opacity="0.85"/>
          <ellipse cx="72" cy="52" rx="13" ry="11" fill="#9dd8e4" opacity="0.85"/>
          <circle cx="38" cy="52" r="5.5" fill="#0a1f3d"/>
          <circle cx="72" cy="52" r="5.5" fill="#0a1f3d"/>
          <circle cx="40" cy="50" r="1.8" fill="white"/>
          <circle cx="74" cy="50" r="1.8" fill="white"/>
          <ellipse cx="55" cy="64" rx="5" ry="3.5" fill="#0a1f3d"/>
          <path d="M47 71 Q55 77 63 71" stroke="#0a1f3d" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <ellipse cx="28" cy="66" rx="7" ry="4" fill="#00B4D8" opacity="0.3"/>
          <ellipse cx="82" cy="66" rx="7" ry="4" fill="#00B4D8" opacity="0.3"/>
        </svg>
      </div>
      <span class="state-label" style="color: #00B4D8;">Bom</span>
      <span class="state-name" style="color: #00B4D8;">Teal</span>
    </div>

    <!-- NORMAL -->
    <div class="state-card">
      <div class="panda-wrapper">
        <div class="glow-ring" style="background: radial-gradient(circle, #6BCB8B, #4aaa6b);"></div>
        <svg width="110" height="110" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="24" cy="26" rx="14" ry="14" fill="#e8f5ed"/>
          <ellipse cx="86" cy="26" rx="14" ry="14" fill="#e8f5ed"/>
          <ellipse cx="24" cy="26" rx="8" ry="8" fill="#b3dfc0"/>
          <ellipse cx="86" cy="26" rx="8" ry="8" fill="#b3dfc0"/>
          <circle cx="55" cy="58" r="42" fill="#eff7f2"/>
          <ellipse cx="38" cy="52" rx="13" ry="11" fill="#a8d8b4" opacity="0.85"/>
          <ellipse cx="72" cy="52" rx="13" ry="11" fill="#a8d8b4" opacity="0.85"/>
          <circle cx="38" cy="52" r="5.5" fill="#1a2d1e"/>
          <circle cx="72" cy="52" r="5.5" fill="#1a2d1e"/>
          <circle cx="40" cy="50" r="1.8" fill="white"/>
          <circle cx="74" cy="50" r="1.8" fill="white"/>
          <ellipse cx="55" cy="64" rx="5" ry="3.5" fill="#1a2d1e"/>
          <path d="M48 70 Q55 75 62 70" stroke="#1a2d1e" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <ellipse cx="28" cy="66" rx="7" ry="4" fill="#6BCB8B" opacity="0.3"/>
          <ellipse cx="82" cy="66" rx="7" ry="4" fill="#6BCB8B" opacity="0.3"/>
        </svg>
      </div>
      <span class="state-label" style="color: #6BCB8B;">Normal</span>
      <span class="state-name" style="color: #6BCB8B;">Verde</span>
    </div>

    <!-- FRACO -->
    <div class="state-card">
      <div class="panda-wrapper">
        <div class="glow-ring" style="background: radial-gradient(circle, #F0B429, #d49620);"></div>
        <svg width="110" height="110" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="24" cy="26" rx="14" ry="14" fill="#fdf3dc"/>
          <ellipse cx="86" cy="26" rx="14" ry="14" fill="#fdf3dc"/>
          <ellipse cx="24" cy="26" rx="8" ry="8" fill="#f0d898"/>
          <ellipse cx="86" cy="26" rx="8" ry="8" fill="#f0d898"/>
          <circle cx="55" cy="58" r="42" fill="#fdf6e8"/>
          <ellipse cx="38" cy="52" rx="13" ry="11" fill="#e8c87a" opacity="0.7"/>
          <ellipse cx="72" cy="52" rx="13" ry="11" fill="#e8c87a" opacity="0.7"/>
          <!-- Tired eyes - half closed -->
          <circle cx="38" cy="53" r="5.5" fill="#2d1f0a"/>
          <circle cx="72" cy="53" r="5.5" fill="#2d1f0a"/>
          <rect x="32" y="47" width="12" height="5" rx="2" fill="#fdf6e8"/>
          <rect x="66" y="47" width="12" height="5" rx="2" fill="#fdf6e8"/>
          <circle cx="40" cy="52" r="1.5" fill="white"/>
          <circle cx="74" cy="52" r="1.5" fill="white"/>
          <ellipse cx="55" cy="64" rx="5" ry="3.5" fill="#2d1f0a"/>
          <!-- Neutral mouth -->
          <path d="M48 71 Q55 73 62 71" stroke="#2d1f0a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <ellipse cx="28" cy="66" rx="7" ry="4" fill="#F0B429" opacity="0.25"/>
          <ellipse cx="82" cy="66" rx="7" ry="4" fill="#F0B429" opacity="0.25"/>
        </svg>
      </div>
      <span class="state-label" style="color: #F0B429;">Fraco</span>
      <span class="state-name" style="color: #F0B429;">Ocre</span>
    </div>

    <!-- CRÍTICO -->
    <div class="state-card">
      <div class="panda-wrapper">
        <div class="glow-ring" style="background: radial-gradient(circle, #C0704A, #8B3A1A);"></div>
        <svg width="110" height="110" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="24" cy="26" rx="14" ry="14" fill="#f5e8e0"/>
          <ellipse cx="86" cy="26" rx="14" ry="14" fill="#f5e8e0"/>
          <ellipse cx="24" cy="26" rx="8" ry="8" fill="#d4a88a"/>
          <ellipse cx="86" cy="26" rx="8" ry="8" fill="#d4a88a"/>
          <circle cx="55" cy="58" r="42" fill="#f7f0ec"/>
          <ellipse cx="38" cy="52" rx="13" ry="11" fill="#c4896a" opacity="0.65"/>
          <ellipse cx="72" cy="52" rx="13" ry="11" fill="#c4896a" opacity="0.65"/>
          <!-- Very tired eyes -->
          <circle cx="38" cy="54" r="5.5" fill="#2d0f0a"/>
          <circle cx="72" cy="54" r="5.5" fill="#2d0f0a"/>
          <rect x="31" y="47" width="14" height="7" rx="2" fill="#f7f0ec"/>
          <rect x="65" y="47" width="14" height="7" rx="2" fill="#f7f0ec"/>
          <circle cx="39" cy="54" r="1.5" fill="white" opacity="0.7"/>
          <circle cx="73" cy="54" r="1.5" fill="white" opacity="0.7"/>
          <ellipse cx="55" cy="65" rx="4.5" ry="3" fill="#2d0f0a"/>
          <!-- Sad mouth -->
          <path d="M48 74 Q55 69 62 74" stroke="#2d0f0a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <!-- ZZZ for sleepy -->
          <text x="78" y="35" font-family="Sora, sans-serif" font-size="10" fill="#C0704A" opacity="0.6" font-weight="600">z</text>
          <text x="85" y="27" font-family="Sora, sans-serif" font-size="13" fill="#C0704A" opacity="0.4" font-weight="600">z</text>
          <text x="93" y="20" font-family="Sora, sans-serif" font-size="9" fill="#C0704A" opacity="0.25" font-weight="600">z</text>
        </svg>
      </div>
      <span class="state-label" style="color: #C0704A;">Crítico</span>
      <span class="state-name" style="color: #C0704A;">Âmbar</span>
    </div>

  </div>

  <!-- TAMANHOS -->
  <div class="section-divider"></div>
  <p class="section-title">Escalas de uso</p>
  <div class="sizes-grid">

    <!-- Dashboard hero -->
    <div class="size-card">
      <div style="position:relative; width:100px; height:100px; display:flex; align-items:center; justify-content:center;">
        <div style="position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle, #7DD9FF, #00B4D8); filter:blur(20px); opacity:0.3;"></div>
        <svg class="floating" width="88" height="88" viewBox="0 0 110 110" fill="none">
          <ellipse cx="24" cy="26" rx="14" ry="14" fill="#e8f7ff"/>
          <ellipse cx="86" cy="26" rx="14" ry="14" fill="#e8f7ff"/>
          <ellipse cx="24" cy="26" rx="8" ry="8" fill="#b3e9ff"/>
          <ellipse cx="86" cy="26" rx="8" ry="8" fill="#b3e9ff"/>
          <circle cx="55" cy="58" r="42" fill="#f0faff"/>
          <ellipse cx="38" cy="52" rx="13" ry="11" fill="#c8eeff" opacity="0.9"/>
          <ellipse cx="72" cy="52" rx="13" ry="11" fill="#c8eeff" opacity="0.9"/>
          <circle cx="38" cy="52" r="5.5" fill="#0a1f3d"/>
          <circle cx="72" cy="52" r="5.5" fill="#0a1f3d"/>
          <circle cx="40" cy="50" r="1.8" fill="white"/>
          <circle cx="74" cy="50" r="1.8" fill="white"/>
          <ellipse cx="55" cy="64" rx="5" ry="3.5" fill="#0a1f3d"/>
          <path d="M46 72 Q55 80 64 72" stroke="#0a1f3d" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <ellipse cx="28" cy="66" rx="7" ry="4" fill="#7DD9FF" opacity="0.4"/>
          <ellipse cx="82" cy="66" rx="7" ry="4" fill="#7DD9FF" opacity="0.4"/>
        </svg>
      </div>
      <span class="size-label">Dashboard — 88px</span>
    </div>

    <!-- Notificação -->
    <div class="size-card">
      <div style="position:relative; width:56px; height:56px; display:flex; align-items:center; justify-content:center;">
        <svg width="48" height="48" viewBox="0 0 110 110" fill="none">
          <ellipse cx="24" cy="26" rx="14" ry="14" fill="#e8f7ff"/>
          <ellipse cx="86" cy="26" rx="14" ry="14" fill="#e8f7ff"/>
          <ellipse cx="24" cy="26" rx="8" ry="8" fill="#b3e9ff"/>
          <ellipse cx="86" cy="26" rx="8" ry="8" fill="#b3e9ff"/>
          <circle cx="55" cy="58" r="42" fill="#f0faff"/>
          <ellipse cx="38" cy="52" rx="13" ry="11" fill="#c8eeff" opacity="0.9"/>
          <ellipse cx="72" cy="52" rx="13" ry="11" fill="#c8eeff" opacity="0.9"/>
          <circle cx="38" cy="52" r="5.5" fill="#0a1f3d"/>
          <circle cx="72" cy="52" r="5.5" fill="#0a1f3d"/>
          <circle cx="40" cy="50" r="1.8" fill="white"/>
          <circle cx="74" cy="50" r="1.8" fill="white"/>
          <ellipse cx="55" cy="64" rx="5" ry="3.5" fill="#0a1f3d"/>
          <path d="M46 72 Q55 80 64 72" stroke="#0a1f3d" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <span class="size-label">Notificação — 48px</span>
    </div>

    <!-- Ícone -->
    <div class="size-card">
      <div style="position:relative; width:36px; height:36px; display:flex; align-items:center; justify-content:center;">
        <svg width="32" height="32" viewBox="0 0 110 110" fill="none">
          <ellipse cx="24" cy="26" rx="14" ry="14" fill="#e8f7ff"/>
          <ellipse cx="86" cy="26" rx="14" ry="14" fill="#e8f7ff"/>
          <ellipse cx="24" cy="26" rx="8" ry="8" fill="#b3e9ff"/>
          <ellipse cx="86" cy="26" rx="8" ry="8" fill="#b3e9ff"/>
          <circle cx="55" cy="58" r="42" fill="#f0faff"/>
          <ellipse cx="38" cy="52" rx="13" ry="11" fill="#c8eeff" opacity="0.9"/>
          <ellipse cx="72" cy="52" rx="13" ry="11" fill="#c8eeff" opacity="0.9"/>
          <circle cx="38" cy="52" r="5.5" fill="#0a1f3d"/>
          <circle cx="72" cy="52" r="5.5" fill="#0a1f3d"/>
          <circle cx="40" cy="50" r="1.8" fill="white"/>
          <circle cx="74" cy="50" r="1.8" fill="white"/>
          <ellipse cx="55" cy="64" rx="5" ry="3.5" fill="#0a1f3d"/>
        </svg>
      </div>
      <span class="size-label">Ícone — 32px</span>
    </div>

  </div>

  <!-- Nome -->
  <div style="text-align:center; margin-top: 72px;">
    <p style="font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.2);">CarePlus+ · Mascote v0.1</p>
  </div>

</body>
</html>
